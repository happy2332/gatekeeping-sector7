app = "gatekeeping-sector7"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  GK_DB = "/data/gatekeeping.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "gk_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"
