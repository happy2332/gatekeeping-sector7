services:
  - type: web
    name: gatekeeping-sector7
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    # gunicorn binds to $PORT (set by Render). 1 worker is fine for ~100 req/day.
    # --threads 2 lets us serve a slow request without blocking another guard tap.
    startCommand: gunicorn --workers 1 --threads 2 --bind 0.0.0.0:$PORT app:app
    envVars:
      # WARNING: Render free tier doesn't support persistent disks. The SQLite
      # file lives in the container's ephemeral filesystem and is wiped on every
      # redeploy and whenever Render recycles the container (every few days).
      # Use for demo / acceptance testing only. For real data, move to Fly.io
      # free tier (has volumes) or upgrade to Render Starter ($7/mo) and re-add
      # a disk: block here.
      - key: GK_DB
        value: /tmp/gatekeeping.db
      - key: GK_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false   # set this in the Render dashboard, don't commit
      - key: GUARD_PASSWORD
        sync: false
